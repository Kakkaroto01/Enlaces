<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Adrenalina TV</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #17171c;
    --surface2: #21212a;
    --border: #2e2e3a;
    --accent: #e8380d;
    --accent2: #ff6b42;
    --text: #eaeaf2;
    --muted: #5a5a70;
    --green: #22c55e;
    --blue: #3b82f6;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100vw; height:100vh; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Barlow',sans-serif; }

  /* ===== LAYOUT ===== */
  #app {
    display: grid;
    grid-template-rows: 64px 1fr;
    grid-template-columns: 240px 1fr;
    height: 100vh;
    width: 100vw;
  }

  /* TOP BAR */
  #topbar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 20px;
    background: var(--surface);
    border-bottom: 2px solid var(--border);
  }
  #topbar h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 1.7rem;
    color: var(--accent);
    letter-spacing: 0.04em;
  }
  #topbar .date {
    font-size: 0.8rem;
    color: var(--muted);
    margin-left: 4px;
  }
  .spacer { flex: 1; }
  .top-btn {
    font-family: 'Barlow', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 8px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s, background 0.15s;
  }
  .top-btn:hover { opacity: 0.85; }
  .btn-edit { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-edit:hover { background: var(--border); }

  /* SIDEBAR */
  #sidebar {
    background: var(--surface);
    border-right: 2px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 12px 8px;
    gap: 6px;
    overflow: hidden;
  }
  .group-btn {
    width: 100%;
    padding: 14px 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  .group-btn:hover, .group-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .group-btn .ch-count {
    font-size: 0.7rem;
    font-weight: 600;
    background: rgba(0,0,0,0.3);
    border-radius: 5px;
    padding: 2px 6px;
    flex-shrink: 0;
  }

  /* CONTENT AREA */
  #content {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 14px 16px;
    gap: 10px;
  }

  #content-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--accent2);
    flex-shrink: 0;
  }

  /* CHANNELS GRID */
  #channels-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
    overflow: hidden;
    align-content: start;
  }

  .ch-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    overflow: hidden;
  }
  .ch-card:hover { border-color: var(--accent2); background: var(--surface2); }
  .ch-card-header {
    padding: 14px 14px 10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .ch-card-header .n-links {
    font-size: 0.65rem;
    color: var(--muted);
    font-weight: 600;
  }
  .ch-links {
    display: none;
    flex-direction: column;
    gap: 4px;
    padding: 0 10px 10px;
  }
  .ch-links.open { display: flex; }
  .ch-link-btn {
    display: block;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 0.78rem;
    padding: 8px 10px;
    border-radius: 7px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .ch-link-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }
  .quality-tag {
    display: inline-block;
    font-size: 0.6rem;
    font-weight: 700;
    border-radius: 3px;
    padding: 1px 4px;
    margin-right: 5px;
    vertical-align: middle;
  }
  .q-fhd { background: rgba(34,197,94,0.2); color: var(--green); }
  .q-hd  { background: rgba(232,107,66,0.2); color: var(--accent2); }
  .q-sd  { background: rgba(100,100,120,0.3); color: var(--muted); }

  /* EDIT MODAL */
  #modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  #modal.open { display: flex; }
  #modal-box {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    width: 88vw;
    max-width: 900px;
    height: 80vh;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  #modal-box h2 { font-family:'Barlow Condensed',sans-serif; font-size:1.5rem; font-weight:700; }
  #modal-box p { font-size:0.78rem; color:var(--muted); }
  #edit-ta {
    flex:1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Courier New', monospace;
    font-size: 0.78rem;
    padding: 12px;
    resize: none;
    outline: none;
  }
  #edit-error { color: #f87171; font-size:0.8rem; display:none; }
  .modal-actions { display:flex; gap:10px; justify-content:flex-end; }
  .btn-primary { background:var(--accent); color:white; }
  .btn-cancel  { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
</style>
</head>
<body>
<div id="app">

  <!-- TOPBAR -->
  <div id="topbar">
    <h1>⚡ ADRENALINA</h1>
    <span class="date" id="fecha-label"></span>
    <div class="spacer"></div>
    <button class="top-btn btn-edit" onclick="openEdit()">✏️ Editar datos</button>
  </div>

  <!-- SIDEBAR -->
  <div id="sidebar" role="navigation"></div>

  <!-- CONTENT -->
  <div id="content">
    <div id="content-title">Selecciona un grupo</div>
    <div id="channels-grid"></div>
  </div>

</div>

<!-- EDIT MODAL -->
<div id="modal">
  <div id="modal-box">
    <h2>✏️ Editor de datos</h2>
    <p>Edita canales y grupos directamente. Cambia hashes, añade o elimina canales. Formato: <code>{"GRUPO": {"CANAL": [{"label":"...","hash":"..."}]}}</code></p>
    <div id="edit-error">⚠️ JSON no válido. Revisa la sintaxis antes de guardar.</div>
    <textarea id="edit-ta"></textarea>
    <div class="modal-actions">
      <button class="top-btn btn-cancel" onclick="closeEdit()">Cancelar</button>
      <button class="top-btn btn-primary" onclick="saveEdit()">💾 Guardar</button>
    </div>
  </div>
</div>

// ─────────────────────────────────────────────────────────
let groups = null;
let activeGroup = null;
let openCard = null;

function load() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) { try { groups = JSON.parse(saved); } catch(e) { groups = DEFAULT_GROUPS; } }
  else groups = DEFAULT_GROUPS;
}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(groups)); }

// ── RENDER SIDEBAR ────────────────────────────────────────
function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';
  for (const [gName, channels] of Object.entries(groups)) {
    const btn = document.createElement('button');
    btn.className = 'group-btn' + (activeGroup === gName ? ' active' : '');
    btn.innerHTML = `<span>${esc(gName)}</span><span class="ch-count">${Object.keys(channels).length}</span>`;
    btn.addEventListener('click', () => selectGroup(gName));
    sidebar.appendChild(btn);
  }
}

// ── SELECT GROUP ──────────────────────────────────────────
function selectGroup(gName) {
  activeGroup = gName;
  openCard = null;
  renderSidebar();
  document.getElementById('content-title').textContent = gName;
  renderGrid();
}

// ── RENDER GRID ───────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('channels-grid');
  grid.innerHTML = '';
  if (!activeGroup || !groups[activeGroup]) return;

  const channels = groups[activeGroup];

  for (const [chName, links] of Object.entries(channels)) {
    const card = document.createElement('div');
    card.className = 'ch-card';

    const header = document.createElement('div');
    header.className = 'ch-card-header';
    header.innerHTML = `<span>${esc(chName)}</span><span class="n-links">${links.length} enlace${links.length>1?'s':''}</span>`;
    card.appendChild(header);

    const linksDiv = document.createElement('div');
    linksDiv.className = 'ch-links';

    for (const lnk of links) {
      const a = document.createElement('a');
      a.className = 'ch-link-btn';
      a.href = 'acestream://' + lnk.hash;
      const quality = lnk.label.includes('FHD') ? 'FhD' : lnk.label.includes(' HD') ? 'HD' : lnk.label.includes(' SD') ? 'SD' : '';
      // Source: ELCANO, NEW ERA, SPORT TV, etc.
      const srcMatch = lnk.label.match(/-->\s*(.+)$/);
      const src = srcMatch ? srcMatch[1].trim() : lnk.label;
      const qClass = quality === 'FhD' ? 'q-fhd' : quality === 'HD' ? 'q-hd' : 'q-sd';
      const qLabel = quality === 'FhD' ? 'FHD' : quality;
      a.innerHTML = quality ? `<span class="quality-tag ${qClass}">${qLabel}</span>${esc(src)}` : esc(lnk.label);
      a.title = lnk.label;
      linksDiv.appendChild(a);
    }

    card.appendChild(linksDiv);

    header.addEventListener('click', () => {
      const isOpen = linksDiv.classList.contains('open');
      // Close all
      document.querySelectorAll('.ch-links.open').forEach(el => el.classList.remove('open'));
      if (!isOpen) linksDiv.classList.add('open');
    });

    grid.appendChild(card);
  }
}

// ── EDIT MODAL ────────────────────────────────────────────
function openEdit() {
  document.getElementById('edit-ta').value = JSON.stringify(groups, null, 2);
  document.getElementById('edit-error').style.display = 'none';
  document.getElementById('modal').classList.add('open');
}
function closeEdit() { document.getElementById('modal').classList.remove('open'); }
function saveEdit() {
  try {
    groups = JSON.parse(document.getElementById('edit-ta').value);
    save();
    closeEdit();
    renderSidebar();
    if (activeGroup && !groups[activeGroup]) activeGroup = null;
    document.getElementById('channels-grid').innerHTML = '';
    document.getElementById('content-title').textContent = 'Selecciona un grupo';
  } catch(e) {
    document.getElementById('edit-error').style.display = 'block';
  }
}
document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeEdit(); });

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── INIT ─────────────────────────────────────────────────
load();
document.getElementById('fecha-label').textContent = localStorage.getItem('adrenalina_fecha') || '2026-02-21';
renderSidebar();
// Auto-select first group
const firstGroup = Object.keys(groups)[0];
if (firstGroup) selectGroup(firstGroup);
</script>
